name: cross-platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: cross-platform smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/cross-platform-smoke.yml@71f4345cad2998a16e8e14b800eee88c68d865ac # 0.2.3
    with:
      os_list: '["${{ matrix.os }}"]'
      command: |
        python - <<'PY'
        from pathlib import Path
        import json
        import os

        required = [
          "README.md",
          "LICENSE",
          "NOTICE",
          "VERSION",
        ]
        missing = [path for path in required if not Path(path).exists()]
        if missing:
          raise SystemExit(f"missing required path(s): {', '.join(missing)}")

        manifest = {
          "os": os.environ.get("RUNNER_OS", "unknown"),
          "version_file": (Path("VERSION").read_text(encoding="utf-8").strip()),
        }
        print(json.dumps(manifest, sort_keys=True))
        print("cross-platform metadata smoke passed")
        PY
